<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downloads - WiiDev</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      background: #020617;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #1e293b;
    }

    header h1 {
      margin: 0;
      color: #38bdf8;
    }

    .container {
      padding: 40px 20px;
      max-width: 1000px;
      margin: auto;
      text-align: center;
    }

    h2 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .apps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .app-card {
      background: #020617;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #1e293b;
      text-align: left;
    }

    .app-card h3 {
      margin-top: 0;
      color: #38bdf8;
    }

    .app-card p {
      font-size: 0.9rem;
    }

    .download-btn {
      margin-top: 10px;
      display: inline-block;
      background: #38bdf8;
      color: #020617;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      border: none;
    }

    .download-btn:hover {
      opacity: 0.9;
    }

    footer {
      text-align: center;
      padding: 15px;
      border-top: 1px solid #1e293b;
      color: #64748b;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <header>
    <h1>WiiDev Downloads</h1>
  </header>

  <div class="container">
    <h2>Available Apps</h2>
    <p>Browse and download apps created by the WiiDev community.</p>

    <div class="apps" id="appsContainer"></div>
  </div>

  <footer>
    <p>© 2026 WiiDev Community</p>
  </footer>

  <script>
    // JSON data for apps
    const apps = [
      {
        name: "Wii HelloWorld Example (C++)",
        description: "A C++ source code containing ZIP file for a Wii Homebrew App. Prints 'Hello World!' by default. You need devkitPro and Dolphin emulator to make and run this code.",
        file: "downloads/wii-helloworld-cpp.zip"
      },
    ];

    const container = document.getElementById('appsContainer');

    // Generate cards dynamically
    apps.forEach(app => {
      const card = document.createElement('div');
      card.className = 'app-card';

      card.innerHTML = `
        <h3>${app.name}</h3>
        <p>${app.description}</p>
        <button class="download-btn">Download</button>
      `;

      const button = card.querySelector('button');
      button.onclick = () => downloadApp(app);

      container.appendChild(card);
    });

    function downloadApp(app) {
      alert(app.name + ' download will start soon! (placeholder)');
      window.location.href = "downloads/wii-helloworld-cpp.zip";
    }
  </script>

</body>
</html>
