<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Service Temporarily Unavailable</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .wrapper {
      text-align: center;
      max-width: 480px;
    }
    h1 {
      font-size: 2.2rem;
      margin-bottom: 0.75rem;
    }
    .code {
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #38bdf8;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 0.98rem;
      line-height: 1.5;
      color: #cbd5f5;
      margin-bottom: 1.5rem;
    }
    .hint {
      font-size: 0.8rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="code">HTTP 503 – Service Unavailable</div>
    <h1>We’re doing some work right now</h1>
    <p>
      The site is temporarily unavailable while we perform maintenance and updates.
      Please check back in a little while.
    </p>
    <p class="hint">
      If you’re the site owner, remember to remove this placeholder once maintenance is complete.
    </p>
  </div>
</body>
</html>
